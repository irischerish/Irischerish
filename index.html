<title>荒野旅 ─ 互動文字冒險</title><style>@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Ma+Shan+Zheng&family=Cinzel:wght@400;600&display=swap');:root{--bg:#13100c;--paper:#1d1710;--paper2:#161108;--border:#3a2d1e;--border2:#5c4428;--text:#e8ddc8;--dim:#7a6a50;--accent:#d4853a;--accent2:#8fad5a;--danger:#d44040;--c0:#d44040;--c1:#8fad5a;--c2:#5abca0;--c3:#d4853a;--c4:#d4853a;--c5:#d44040;--c6:#e8c86a;--c7:#b080e8;--c8:#5abca0;--c9:#e8906a;--btn-bg:#1a140c;--btn-hover:#241a0e;--btn-border:#4a3520;--gold:#d4853a;--sea:#8fad5a;}*{box-sizing:border-box;margin:0;padding:0;}body{background:var(--bg);color:var(--text);font-family:'Noto Serif TC',serif;font-size:14px;line-height:2;min-height:100vh;background-image:radial-gradient(ellipse 80% 60% at 50% 0%,#2a1a08 0%,transparent 70%),repeating-linear-gradient( 0deg,transparent,transparent 40px,rgba(80,50,20,0.04) 40px,rgba(80,50,20,0.04) 41px );}body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(ellipse at center,transparent 35%,rgba(0,0,0,0.65) 100%);}#app{position:relative;z-index:1;max-width:700px;margin:0 auto;padding:0 16px 80px;}#title-bar{text-align:center;padding:28px 0 16px;margin-bottom:24px;position:relative;}#title-bar::before{content:'';position:absolute;bottom:0;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--border2) 20%,var(--gold) 50%,var(--border2) 80%,transparent);}#title-bar::after{content:'◆';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);font-size:.6rem;color:var(--gold);background:var(--bg);padding:0 10px;}#title-bar h1{font-family:'Ma Shan Zheng',cursive;font-size:2rem;font-weight:400;color:var(--text);letter-spacing:10px;text-indent:10px;text-shadow:0 0 40px rgba(212,133,58,0.5),0 0 80px rgba(143,173,90,0.2),0 2px 4px rgba(0,0,0,0.7);animation:titleDrift 6s ease-in-out infinite;}@keyframes titleDrift{0%,100%{text-shadow:0 0 40px rgba(212,133,58,0.5),0 0 80px rgba(143,173,90,0.2),0 2px 4px rgba(0,0,0,0.7);}50%{text-shadow:0 0 55px rgba(212,133,58,0.7),0 0 100px rgba(143,173,90,0.3),0 2px 4px rgba(0,0,0,0.7);}}#title-bar .sub{font-family:'Cinzel',serif;color:var(--dim);font-size:0.62rem;margin-top:10px;letter-spacing:6px;text-transform:uppercase;opacity:.8;}#stats-bar{display:none;gap:0;font-size:0.72rem;color:var(--dim);padding:0;background:transparent;border-top:1px solid var(--border);border-bottom:1px solid var(--border);margin-bottom:18px;font-variant-numeric:tabular-nums;position:relative;justify-content:center;}#stats-bar .stat{display:flex;gap:5px;align-items:center;padding:6px 14px;border-right:1px solid var(--border);}#stats-bar .stat:last-child{border-right:none;}#stats-bar .stat-val{color:var(--gold);font-weight:700;min-width:2ch;}#scene-display{background:var(--paper);border:1px solid var(--border);padding:32px 28px;min-height:220px;line-height:2.2;margin-bottom:16px;position:relative;color:var(--text);transition:opacity 0.25s ease;box-shadow:inset 0 0 80px rgba(0,0,0,0.4),0 8px 40px rgba(0,0,0,0.4),0 0 0 1px rgba(60,35,10,0.3);display:flex;align-items:center;justify-content:center;}#scene-display::before{content:'';position:absolute;inset:8px;border:1px solid transparent;border-image:linear-gradient(135deg,var(--border2) 0%,transparent 40%,transparent 60%,var(--border2) 100%) 1;pointer-events:none;}#scene-display::after{content:'';position:absolute;top:0;left:15%;right:15%;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:0.4;}.sd-inner{width:100%;}#scene-display img{display:block;max-width:100%;max-height:300px;margin:16px auto;border:1px solid var(--border2);box-shadow:0 4px 20px rgba(0,0,0,0.5);}#scene-display hr{border:none;height:1px;background:linear-gradient(90deg,transparent,var(--border2) 30%,var(--border2) 70%,transparent);margin:18px 0;}#scene-display .dbox{border:1px solid var(--border2);border-left:2px solid var(--gold);padding:12px 16px;margin:12px 0;background:rgba(20,14,6,0.6);}#choices{display:flex;flex-direction:column;gap:8px;margin-top:12px;transition:opacity 0.25s ease;}.btn{background:var(--btn-bg);border:1px solid var(--btn-border);color:var(--text);padding:11px 18px;cursor:pointer;font-family:'Noto Serif TC',serif;font-size:0.88rem;text-align:left;transition:all 0.18s ease;position:relative;overflow:hidden;letter-spacing:.03em;}.btn::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(180deg,var(--gold) 0%,var(--sea) 100%);opacity:0.5;transition:opacity 0.18s ease;}.btn-arrow{display:inline-block;color:var(--gold);margin-right:10px;font-size:0.75em;opacity:.7;transition:transform 0.18s ease,opacity 0.18s ease;}.btn::after{content:'';position:absolute;inset:0;background:linear-gradient(105deg,transparent 40%,rgba(212,133,58,0.06) 50%,transparent 60%);opacity:0;transition:opacity 0.18s ease;}.btn:hover{background:var(--btn-hover);border-color:var(--border2);color:var(--accent);box-shadow:inset 0 0 20px rgba(212,133,58,0.04);}.btn:hover::before{opacity:1;}.btn:hover .btn-arrow{transform:translateX(4px);opacity:1;color:var(--sea);}.btn:hover::after{opacity:1;}.btn-bag{border-radius:6px;font-weight:600;letter-spacing:.06em;padding:13px 18px;transition:all 0.2s ease;box-shadow:0 3px 12px rgba(0,0,0,0.4);}.btn-bag::before{display:none;}.btn-bag .btn-arrow{display:none;}.btn-bag-white{background:linear-gradient(135deg,#1a1410 0%,#131008 100%);border:1px dashed rgba(180,150,100,0.4);border-top:2px dashed rgba(200,170,120,0.5);color:#a09070;}.btn-bag-white:hover{background:linear-gradient(135deg,#241c14 0%,#1a1410 100%);border-color:rgba(200,170,120,0.7);color:#c0b090;box-shadow:0 4px 20px rgba(150,120,60,0.2);}.btn-bag-blue{background:linear-gradient(135deg,#0c1820 0%,#081014 100%);border:1px solid rgba(60,120,200,0.35);border-top:2px solid rgba(60,120,200,0.7);color:#6090c0;}.btn-bag-blue:hover{background:linear-gradient(135deg,#102030 0%,#0c1820 100%);border-color:rgba(60,120,200,0.7);color:#80b0e0;box-shadow:0 4px 20px rgba(40,100,200,0.2);}.btn-bag-red{background:linear-gradient(135deg,#200a0a 0%,#180808 100%);border:1px solid rgba(180,60,60,0.35);border-top:2px solid rgba(180,60,60,0.7);color:#c06060;}.btn-bag-red:hover{background:linear-gradient(135deg,#2c1010 0%,#200a0a 100%);border-color:rgba(180,60,60,0.7);color:#e08080;box-shadow:0 4px 20px rgba(160,40,40,0.2);}.btn-bag-orange{background:linear-gradient(135deg,#201408 0%,#180e04 100%);border:1px solid rgba(180,100,30,0.35);border-top:2px solid rgba(180,100,30,0.7);color:#c07030;}.btn-bag-orange:hover{background:linear-gradient(135deg,#2c1c0c 0%,#201408 100%);border-color:rgba(180,100,30,0.7);color:#e09040;box-shadow:0 4px 20px rgba(160,90,20,0.2);}.btn-bag-torn{background:linear-gradient(135deg,#180808 0%,#100404 100%);border:1px dashed rgba(100,40,40,0.5);border-top:2px dashed rgba(120,50,50,0.6);color:#806060;opacity:0.85;}.btn-bag-torn:hover{background:linear-gradient(135deg,#200c0c 0%,#180808 100%);border-color:rgba(150,60,60,0.7);color:#a07070;opacity:1;box-shadow:0 4px 20px rgba(120,30,30,0.2);}.c0{color:var(--c0)}.c1{color:var(--c1)}.c2{color:var(--c2)}.c3{color:var(--c3)}.c4{color:var(--c4)}.c5{color:var(--c5)}.c6{color:var(--c6)}.c7{color:var(--c7)}.c8{color:var(--c8)}.c9{color:var(--c9)}.v{font-weight:700;color:var(--gold);}p{margin:4px 0;text-align:center;}.inp{background:var(--paper2);border:1px solid var(--btn-border);border-bottom:2px solid var(--gold);color:var(--text);padding:8px 14px;font-family:'Noto Serif TC',serif;font-size:0.88rem;width:180px;outline:none;transition:border-color 0.2s,box-shadow 0.2s;margin:8px 4px;}.inp:focus{border-bottom-color:var(--sea);box-shadow:0 2px 0 0 rgba(143,173,90,0.3);}::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-track{background:var(--bg);}::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--gold),var(--sea));border-radius:3px;}#game-footer{border-top:1px solid var(--border);position:relative;padding:18 <div id="app">
<div id="title-bar">
<canvas id="fire-canvas" width="64" height="64" style="display:block;margin:0 auto 8px;width:48px;height:48px;image-rendering:pixelated;"></canvas>
<h1>荒野旅</h1>
<div class="sub">互動文字冒險</div>
</div>
<div id="stats-bar">
<div class="stat">第 <span class="stat-val" id="s-day">1</span> 天</div>
<div class="stat">時間 <span class="stat-val" id="s-time">早晨</span></div>
<div class="stat">體力 <span class="stat-val" id="s-hp">60</span></div>
<div class="stat">飽腹 <span class="stat-val" id="s-food">60</span></div>
</div>
<div id="scene-display"><p style="color:var(--dim);font-style:italic;text-align:center">載入中…</p></div>
<div id="choices"></div>
</div>
<div id="ending-overlay" style="display:none;position:fixed;inset:0;z-index:200;background:#000;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;">

<div id="ending-inner" style="position:relative;z-index:2;text-align:center;padding:24px 32px;max-width:480px;">
<div id="ending-num" style="font-size:.75rem;letter-spacing:.4em;color:#a09070;margin-bottom:18px;opacity:0;transition:opacity 1.2s;"></div>
<div id="ending-title" style="font-family:'Ma Shan Zheng',cursive;font-size:2rem;color:#e8ddc8;text-shadow:0 0 30px rgba(212,133,58,0.8);letter-spacing:.15em;margin-bottom:28px;opacity:0;transition:opacity 1.6s 0.8s;line-height:1.5;"></div>
<div id="ending-sub" style="font-size:.8rem;color:#7a6a50;letter-spacing:.1em;margin-bottom:32px;opacity:0;transition:opacity 1s 3s;"></div>
<button id="ending-restart" onclick="closeEnding()" style="opacity:0;transition:opacity 1s 3.8s;padding:10px 32px;background:transparent;border:1px solid #5c4428;color:#a09070;font-family:inherit;font-size:.85rem;cursor:pointer;letter-spacing:.15em;">▶ 再次冒險</button>
</div>
</div>

function parseScene(name) {

      break;
    }
    if (line.startsWith('选:') || line.startsWith('选：')) {
      const label = line.slice(2).trim();

function runScene(name) {

    if (result.jump) {
      if (!result.html.trim() || result.html === '') {
        cur = result.jump;
        continue;
      }
      const stripped = result.html.replace(/<[^>]+>/g, '').trim();
      const isLocationAnnounce = result.choices.length === 0 &&
        /^「[^」]{1,20}」[。.]?$/.test(stripped);
      if (isLocationAnnounce) {
        cur = result.jump;
        continue;
      }
      return { ...result, name: cur };
    }
    const idx = sceneList.indexOf(cur);
    if (idx >= 0 && idx < sceneList.length - 1) {
      const next = sceneList[idx + 1];
      if (!result.html.trim()) {
        cur = next;
        continue;
      }
      return { ...result, name: cur, jump: next };
    }

    return { ...result, name: cur };
  }

let _tamaActive = false;
let _tamaFrame = 0;
let _tamaTimer = null;
let _tamaFeedTarget = null;
let _tamaPlayTarget = null;

function tamaAnimate() {
  const canvas = document.getElementById('tama-canvas');
  if (!canvas || !_tamaActive) return;
  const ctx = canvas.getContext('2d');
  ctx.clearRect(0, 0, 48, 48);
  const petType = (MD['鴿']===1||MD['鴿']===2) ? '鴿' : MD['鹿']===1 ? '鹿' : MD['兔']===1 ? '兔' : '熊';
  const pet = TAMA_PETS[petType] || TAMA_PETS['熊'];
  pet.draw(ctx, _tamaFrame);
  _tamaFrame++;
}

function tamaMsg(msg, duration = 1800) {
  const el = document.getElementById('tama-msg');
  if (el) { el.textContent = msg; setTimeout(() => { if(el.textContent===msg) el.textContent=''; }, duration); }
}

function tamaHeart() {
  const screen = document.querySelector('.tama-screen');
  if (!screen) return;
  const h = document.createElement('div');
  h.className = 'tama-heart';
  h.textContent = '♥';
  screen.appendChild(h);
  setTimeout(() => h.remove(), 1000);
}

function tamaUpdateBars() {
  const love = Math.min(100, Math.max(0, (MD['寵愛'] || 0)));
  const food = Math.min(100, Math.max(0, ((MD['寵肚'] || 0) / 10) * 100));
  const lb = document.getElementById('tama-love-bar');
  const fb = document.getElementById('tama-food-bar');
  const ln = document.getElementById('tama-love-num');
  const fn = document.getElementById('tama-food-num');
  if (lb) lb.style.width = love + '%';
  if (fb) fb.style.width = food + '%';
  if (ln) ln.textContent = MD['寵愛'] || 0;
  if (fn) fn.textContent = MD['寵肚'] || 0;
  const nm = document.getElementById('tama-name-lbl');
  if (nm) nm.textContent = MD['寵物'] || '';
}

function tamaRunScene(sceneName, animFn, initMsg) {
  tamaMsg(initMsg);
  if (animFn) animFn();
  const prevScene = _currentScene;
  const result = runScene(sceneName);
  tamaUpdateBars();
  const raw = (result.html || '').replace(/<[^>]+>/g, '').replace(/\s+/g, ' ').trim();
  const msg = raw.slice(0, 24) || initMsg;
  tamaMsg(msg, 3000);
  if (result.jump && result.jump !== '住處' && !TAMA_SCENES[result.jump]) {
    const r2 = runScene(result.jump);
    const msg2 = (r2.html || '').replace(/<[^>]+>/g,'').replace(/\s+/g,' ').trim().slice(0,24);
    tamaMsg(msg2 || '材料不足', 3000);
    tamaUpdateBars();
  }
}

function openTama(feedScene, playScene) {
  _tamaFeedTarget = feedScene;
  _tamaPlayTarget = playScene;
  _tamaActive = true;
  document.getElementById('tama-overlay').classList.add('active');
  tamaUpdateBars();
  tamaAnimate();
  if (_tamaTimer) clearInterval(_tamaTimer);
  _tamaTimer = setInterval(() => { tamaAnimate(); }, 600);

  const btnA = document.getElementById('tama-btn-a');
  const btnB = document.getElementById('tama-btn-b');
  const btnC = document.getElementById('tama-btn-c');

  btnA.onclick = () => {
    const canvas = document.getElementById('tama-canvas');
    if (canvas) { canvas.classList.add('tama-munching'); setTimeout(()=>canvas.classList.remove('tama-munching'),900); }
    tamaRunScene(feedScene, null, '餵食中……');
  };
  btnB.onclick = () => {
    tamaHeart(); setTimeout(tamaHeart, 300);
    tamaRunScene(playScene, null, '一起玩！');
  };
  btnC.onclick = () => { closeTama(); goto('住處'); };
}

function closeTama() {
  _tamaActive = false;
  if (_tamaTimer) { clearInterval(_tamaTimer); _tamaTimer = null; }
  document.getElementById('tama-overlay').classList.remove('active');
}

function drawFoodBase(ctx, W, H, bgTop, bgBot, groundCol) {
  // 通用背景：木桌+布
  fillRect(ctx, bgTop, 0, 0, W, H*0.55|0);
  fillRect(ctx, bgBot, 0, H*0.55|0, W, H);
  fillRect(ctx, groundCol, 0, H*0.55|0, W, 3);
  // 木桌紋
  for(let i=0;i<4;i++) fillRect(ctx,'rgba(0,0,0,0.08)',i*40,H*0.55|0,1,H*0.45|0);
}
function drawBowl(ctx, W, H, cx, cy, rim, inner) {
  // 碗
  fillRect(ctx, rim, cx-22, cy, 44, 18);
  fillRect(ctx, rim, cx-24, cy+4, 48, 14);
  fillRect(ctx, inner, cx-20, cy+2, 40, 14);
  fillRect(ctx, '#2a1808', cx-24, cy+16, 48, 3);
  fillRect(ctx, '#3a2010', cx-20, cy+18, 40, 2);
  fillRect(ctx, rim, cx-16, cy+18, 32, 4);
}
function drawPlate(ctx, W, H, cx, cy, col) {
  fillRect(ctx, col, cx-28, cy+6, 56, 4);
  fillRect(ctx, col, cx-30, cy+2, 60, 6);
  fillRect(ctx, col, cx-28, cy+10, 56, 4);
  ctx.fillStyle = col;
  ctx.beginPath(); ctx.ellipse(cx, cy+8, 28, 10, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.ellipse(cx-8, cy+6, 10, 4, -0.3, 0, Math.PI*2); ctx.fill();
}
function drawCampfire(ctx, W, H, cx, cy) {
  // 篝火石圈
  [[cx-14,cy+18,6,4],[cx+8,cy+18,6,4],[cx-8,cy+20,20,3]].forEach(([x,y,w,h])=>fillRect(ctx,'#504038',x,y,w,h));
  // 木材
  fillRect(ctx,'#6a3818',cx-12,cy+14,24,6); fillRect(ctx,'#4a2810',cx-10,cy+16,20,4);
  // 火焰
  fillRect(ctx,'#e04010',cx-6,cy+4,12,12); fillRect(ctx,'#f06020',cx-4,cy+2,8,12);
  fillRect(ctx,'#f8a000',cx-2,cy,4,10); fillRect(ctx,'#fff0a0',cx-1,cy+2,2,6);
}
function drawSteam(ctx, cx, cy) {
  for(let i=0;i<3;i++) {
    const x = cx-6+i*6, y = cy;
    ctx.fillStyle = 'rgba(220,220,220,0.4)';
    fillRect(ctx,'rgba(220,220,220,0.35)',x,y,2,4);
    fillRect(ctx,'rgba(220,220,220,0.25)',x+1,y-4,2,4);
    fillRect(ctx,'rgba(220,220,220,0.15)',x,y-8,2,3);
  }
}

function drawCageBase(ctx, W, H, floorColor, wallColor) {
  // 牆壁
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0, wallColor[0]); bg.addColorStop(1, wallColor[1]);
  ctx.fillStyle = bg; ctx.fillRect(0,0,W,H);
  // 地板
  ctx.fillStyle = floorColor;
  ctx.fillRect(0, H*0.72, W, H*0.28);
  for(let i=0;i<7;i++){
    ctx.fillStyle = 'rgba(0,0,0,0.12)';
    ctx.fillRect(i*(W/6), H*0.72, 2, H*0.28);
  }
  // 鐵欄杆
  ctx.strokeStyle = '#4a5040'; ctx.lineWidth = 3;
  for(let i=0;i<8;i++){
    ctx.beginPath();
    ctx.moveTo(W*0.08+i*(W*0.84/7), H*0.05);
    ctx.lineTo(W*0.08+i*(W*0.84/7), H*0.7);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(W*0.08,H*0.05); ctx.lineTo(W*0.92,H*0.05); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.08,H*0.35); ctx.lineTo(W*0.92,H*0.35); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.08,H*0.7);  ctx.lineTo(W*0.92,H*0.7);  ctx.stroke();
}

function drawRabbitCage(ctx, W, H) {
  drawCageBase(ctx, W, H, '#1a1a18', ['#141418','#202020']);
  const bx = W*0.5, by = H*0.54;
  // 長耳
  ctx.fillStyle = '#e8e0d8';
  ctx.fillRect(bx-12, by-52, 8, 26); ctx.fillRect(bx+4, by-52, 8, 26);
  ctx.fillStyle = '#f0b0b0';
  ctx.fillRect(bx-10, by-50, 4, 22); ctx.fillRect(bx+6, by-50, 4, 22); // 耳內粉
  // 身體
  ctx.fillStyle = '#e8e0d8';
  ctx.fillRect(bx-18, by-14, 36, 28);
  ctx.fillRect(bx-14, by-30, 28, 18); // 頭
  ctx.fillStyle = '#d04080';
  ctx.fillRect(bx-4, by-22, 6, 6); ctx.fillRect(bx+4, by-22, 6, 6); // 眼（紅）
  ctx.fillStyle = '#f0c0c0';
  ctx.fillRect(bx-3, by-12, 6, 4); // 鼻
  // 小尾巴
  ctx.fillStyle = '#fff';
  ctx.fillRect(bx+14, by, 8, 8);
  // 腳
  ctx.fillStyle = '#e8e0d8';
  ctx.fillRect(bx-16, by+14, 14, 8); ctx.fillRect(bx+2, by+14, 14, 8);
}

function drawPigeon(ctx, W, H) {
  // 背景：室內木籠
  const bg = ctx.createLinearGradient(0,0,0,H);
  bg.addColorStop(0,'#1a1208'); bg.addColorStop(1,'#2e1e0a');
  ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
  // 木地板
  ctx.fillStyle='#3a2008'; ctx.fillRect(0,H*0.75,W,H*0.25);
  for(let i=0;i<6;i++){
    ctx.fillStyle='#2a1505';
    ctx.fillRect(i*(W/5),H*0.75,2,H*0.25);
  }
  // 木籠欄杆
  ctx.strokeStyle='#6a4010'; ctx.lineWidth=3;
  for(let i=0;i<7;i++){
    ctx.beginPath();
    ctx.moveTo(W*0.15+i*(W*0.7/6), H*0.12);
    ctx.lineTo(W*0.15+i*(W*0.7/6), H*0.72);
    ctx.stroke();
  }
  ctx.beginPath(); ctx.moveTo(W*0.15,H*0.12); ctx.lineTo(W*0.85,H*0.12); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.15,H*0.42); ctx.lineTo(W*0.85,H*0.42); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(W*0.15,H*0.72); ctx.lineTo(W*0.85,H*0.72); ctx.stroke();
  // 棲木
  ctx.fillStyle='#8a5520'; ctx.fillRect(W*0.25,H*0.55,W*0.5,5);
  // 鴿子身體
  const px=W*0.5, py=H*0.46;
  ctx.fillStyle='#b0a898';
  ctx.beginPath(); ctx.ellipse(px,py,18,13,0,0,Math.PI*2); ctx.fill();
  // 頭
  ctx.fillStyle='#c0b8a8';
  ctx.beginPath(); ctx.arc(px+14,py-10,9,0,Math.PI*2); ctx.fill();
  // 胸羽光澤
  ctx.fillStyle='#a08878';
  ctx.beginPath(); ctx.ellipse(px-2,py+3,10,7,0.3,0,Math.PI*2); ctx.fill();
  // 眼睛
  ctx.fillStyle='#ff8030';
  ctx.beginPath(); ctx.arc(px+18,py-11,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath(); ctx.arc(px+18,py-11,1.5,0,Math.PI*2); ctx.fill();
  // 嘴
  ctx.fillStyle='#d0a040';
  ctx.beginPath(); ctx.moveTo(px+26,py-10); ctx.lineTo(px+32,py-8); ctx.lineTo(px+26,py-6); ctx.fill();
  // 翅膀紋
  ctx.strokeStyle='#888070'; ctx.lineWidth=1.5;
  for(let i=0;i<3;i++){
    ctx.beginPath(); ctx.moveTo(px-5+i*3,py-5); ctx.lineTo(px-14+i*2,py+8); ctx.stroke();
  }
  // 腳
  ctx.strokeStyle='#c08030'; ctx.lineWidth=2;
  ctx.beginPath(); ctx.moveTo(px+4,py+13); ctx.lineTo(px+4,H*0.56); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(px-4,py+13); ctx.lineTo(px-4,H*0.56); ctx.stroke();
  // 腳環
  ctx.strokeStyle='#d4c040'; ctx.lineWidth=2.5;
  ctx.beginPath(); ctx.arc(px-4,H*0.565,3,0,Math.PI*2); ctx.stroke();
  // 飼料盆
  ctx.fillStyle='#5a3810'; ctx.fillRect(W*0.62,H*0.65,24,8);
  ctx.fillStyle='#d4c080';
  for(let i=0;i<5;i++) { ctx.beginPath(); ctx.arc(W*0.63+i*4,H*0.655,1.5,0,Math.PI*2); ctx.fill(); }
  // 小愛心（好感度）
  ctx.fillStyle='rgba(220,80,80,0.7)';
  ctx.font='10px serif'; ctx.fillText('♥',px+22,py-22);
}

function makeSceneCanvas(drawFn) {
  const c = document.createElement('canvas');
  c.width = 160; c.height = 80;
  c.style.cssText = 'display:block;margin:12px auto 16px;image-rendering:pixelated;width:min(320px,90%);height:auto;aspect-ratio:2/1;border:1px solid var(--border2);';
  const ctx = c.getContext('2d');
  drawFn(ctx, c.width, c.height);
  return c;
}

function fillRect(ctx, color, x, y, w, h) {
  ctx.fillStyle = color;
  ctx.fillRect(x, y, w, h);
}

function getTimeCtx() {
  const t = (typeof _displayTimeSnap !== 'undefined') ? _displayTimeSnap : ((typeof MD !== 'undefined' && MD.用時 !== undefined) ? +MD.用時 : 4);
  return {
    4: { sky1:'#1a2c44', sky2:'#2a4060', horizon:'#e8b870', haze:'rgba(232,180,100,0.15)',
         sun:true, sunHigh:false, moon:false, stars:false, sunColor:'#f0d060' },
    3: { sky1:'#0a1828', sky2:'#1a3a60', horizon:'#6090c0', haze:'rgba(80,130,200,0.08)',
         sun:true, sunHigh:true,  moon:false, stars:false, sunColor:'#f8f0a0' },
    2: { sky1:'#180c14', sky2:'#2e1c28', horizon:'#c05830', haze:'rgba(180,70,30,0.20)',
         sun:true, sunHigh:false, moon:false, stars:false, sunColor:'#e06020', sunset:true },
    1: { sky1:'#04080e', sky2:'#0a1422', horizon:'#101c2e', haze:'rgba(10,20,50,0.12)',
         sun:false, moon:true,  stars:true },
  }[t] || { sky1:'#0a1422', sky2:'#1a2c44', horizon:'#3a5870', sun:false, moon:false, stars:false };
}

function drawTimeSky(ctx, W, H, groundY) {
  const tc = getTimeCtx();
  fillRect(ctx, tc.sky1, 0, 0, W, groundY * 0.6 | 0);
  fillRect(ctx, tc.sky2, 0, groundY * 0.4 | 0, W, groundY * 0.4 | 0);
  fillRect(ctx, tc.horizon, 0, groundY - 4, W, 3);
  ctx.fillStyle = tc.horizon + '50';
  ctx.fillRect(0, groundY - 8, W, 5);
  ctx.fillStyle = tc.haze;
  ctx.fillRect(0, groundY - 12, W, 10);
  if (tc.stars) {
    [[10,5],[30,9],[55,3],[80,7],[110,5],[140,9],[158,4]].forEach(([x,y]) => fillRect(ctx,'#c8d0d8',x,y,1,1));
  }
  if (tc.sun && tc.sunHigh) { // 艷陽

function drawEndingBg(canvas, color) {
  canvas.width = canvas.offsetWidth || 400;

  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;
  ctx.fillStyle = '#04080e';
  ctx.fillRect(0, 0, W, H);
  for (let i = 0; i < 120; i++) {
    const x = Math.random() * W, y = Math.random() * H;
    const r = Math.random() * 1.2;

  ].forEach(([rx,ry])=>{
    f('rgba(220,215,200,0.9)',W*rx|0,H*ry|0,2,2);
    f('rgba(180,170,150,0.5)',W*rx-1|0,H*ry|0,1,1);
  });
  // 月亮
  const mx=W*0.78|0, my=H*0.1|0;
  ctx.fillStyle='#d8e8f0'; ctx.beginPath(); ctx.arc(mx,my,W*0.055,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#e8f4ff'; ctx.beginPath(); ctx.arc(mx,my,W*0.04,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='#04080e'; ctx.beginPath(); ctx.arc(mx+W*0.02,my-H*0.005,W*0.045,0,Math.PI*2); ctx.fill();
  const mg=ctx.createRadialGradient(mx,my,0,mx,my,W*0.25);
  mg.addColorStop(0,'rgba(90,188,160,0.15)'); mg.addColorStop(1,'transparent');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);
  // 遠山
  const skyBot=H*0.45|0;
  ctx.fillStyle='#0a1420'; ctx.beginPath(); ctx.moveTo(0,skyBot);
  [0,0.15,0.25,0.38,0.5,0.62,0.75,0.88,1].forEach((rx,i)=>ctx.lineTo(W*rx|0,H*(i%2===0?0.32:0.38)|0));
  ctx.lineTo(W,skyBot); ctx.closePath(); ctx.fill();
  ctx.fillStyle='#0e1c28'; ctx.beginPath(); ctx.moveTo(0,skyBot);
  [0,0.12,0.22,0.35,0.48,0.6,0.72,0.85,1].forEach((rx,i)=>ctx.lineTo(W*rx|0,H*(i%2===0?0.36:0.41)|0));
  ctx.lineTo(W,skyBot); ctx.closePath(); ctx.fill();
  // 湖面
  f('#0a1828',0,skyBot,W,H-skyBot); f('#0e2038',0,skyBot,W,4);
  const rg=ctx.createLinearGradient(0,skyBot,0,H);
  rg.addColorStop(0,'rgba(90,188,160,0.18)'); rg.addColorStop(0.4,'rgba(90,188,160,0.06)'); rg.addColorStop(1,'transparent');
  ctx.fillStyle=rg; ctx.fillRect(W*0.55|0,skyBot,W*0.35|0,H-skyBot);
  [[0.1,0.52,0.3],[0.5,0.55,0.2],[0.2,0.62,0.25],[0.65,0.68,0.18],[0.35,0.75,0.22],[0.7,0.58,0.15]].forEach(([rx,ry,rw])=>
    f('rgba(90,188,160,0.12)',W*rx|0,H*ry|0,W*rw|0,2));
  // 蘆葦
  [[0.05,0.4,14],[0.08,0.38,16],[0.12,0.41,13],[0.88,0.39,14],[0.91,0.37,17],[0.94,0.4,12]].forEach(([rx,ry,h])=>{
    f('#1a3028',W*rx|0,H*ry|0,3,h); f('#2a4030',W*rx-1|0,H*(ry+0.02)|0,2,6);
  });
  [[0,0.44,30],[0.85,0.44,25],[0.3,0.43,20],[0.55,0.44,22]].forEach(([rx,ry,w])=>{
    f('#1a3020',W*rx|0,H*ry|0,w,6); f('#243828',W*rx+2|0,H*ry-2|0,w-4,4);
  });
  // 女神剪影
  const gx=W*0.5|0, gy=H*0.46|0;
  const hg=ctx.createRadialGradient(gx,gy-H*0.06,0,gx,gy-H*0.06,W*0.18);
  hg.addColorStop(0,'rgba(90,188,160,0.35)'); hg.addColorStop(0.5,'rgba(90,188,160,0.08)'); hg.addColorStop(1,'transparent');
  ctx.fillStyle=hg; ctx.fillRect(0,0,W,H);
  const pg=ctx.createLinearGradient(gx,gy,gx,H);
  pg.addColorStop(0,'rgba(90,188,160,0.2)'); pg.addColorStop(1,'transparent');
  ctx.fillStyle=pg; ctx.fillRect(gx-W*0.04|0,gy,W*0.08|0,H-gy);
  ctx.fillStyle='rgba(90,188,160,0.5)';
  ctx.beginPath(); ctx.moveTo(gx-W*0.06,gy+H*0.05); ctx.lineTo(gx-W*0.12,H*0.52); ctx.lineTo(gx+W*0.12,H*0.52); ctx.lineTo(gx+W*0.06,gy+H*0.05); ctx.closePath(); ctx.fill();
  ctx.fillStyle='rgba(120,220,190,0.3)';
  ctx.beginPath(); ctx.moveTo(gx-W*0.04,gy+H*0.04); ctx.lineTo(gx-W*0.09,H*0.52); ctx.lineTo(gx+W*0.09,H*0.52); ctx.lineTo(gx+W*0.04,gy+H*0.04); ctx.closePath(); ctx.fill();
  f('rgba(90,188,160,0.7)',gx-W*0.025|0,gy-H*0.04|0,W*0.05|0,H*0.1|0);
  f('rgba(140,230,200,0.5)',gx-W*0.015|0,gy-H*0.04|0,W*0.03|0,H*0.07|0);
  ctx.fillStyle='rgba(180,240,220,0.8)'; ctx.beginPath(); ctx.arc(gx,gy-H*0.07,W*0.03,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(220,255,240,0.6)'; ctx.beginPath(); ctx.arc(gx,gy-H*0.07,W*0.02,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(60,160,130,0.7)';
  ctx.beginPath(); ctx.moveTo(gx-W*0.02,gy-H*0.1);
  ctx.quadraticCurveTo(gx-W*0.08,gy-H*0.02,gx-W*0.1,H*0.5); ctx.lineTo(gx-W*0.06,H*0.5);
  ctx.quadraticCurveTo(gx-W*0.04,gy,gx,gy-H*0.04); ctx.closePath(); ctx.fill();
  ctx.beginPath(); ctx.moveTo(gx+W*0.02,gy-H*0.1);
  ctx.quadraticCurveTo(gx+W*0.1,gy-H*0.02,gx+W*0.12,H*0.5); ctx.lineTo(gx+W*0.08,H*0.5);
  ctx.quadraticCurveTo(gx+W*0.04,gy,gx,gy-H*0.04); ctx.closePath(); ctx.fill();
  // 玩家剪影
  const ppx=W*0.28|0, ppy=H*0.42|0;
  f('#0a1018',ppx-W*0.015|0,ppy,W*0.03|0,H*0.08|0);
  ctx.fillStyle='#0a1018'; ctx.beginPath(); ctx.arc(ppx,ppy,W*0.022,0,Math.PI*2); ctx.fill();
  f('#0a1018',ppx-W*0.022|0,ppy+H*0.03|0,W*0.012|0,H*0.05|0);
  f('#0a1018',ppx+W*0.008|0,ppy+H*0.025|0,W*0.012|0,H*0.055|0);
  f('#0a1018',ppx-W*0.012|0,ppy+H*0.08|0,W*0.012|0,H*0.04|0);
  f('#0a1018',ppx+W*0.002|0,ppy+H*0.08|0,W*0.012|0,H*0.04|0);
  // 光粒連結
  for(let i=0;i<12;i++){
    const t=i/11;
    const lx=(ppx+(gx-ppx)*t+Math.sin(t*Math.PI)*W*0.05)|0;
    const ly=(ppy+(gy-ppy)*t)|0;
    const a=(Math.sin(t*Math.PI)*0.8+0.1).toFixed(2);
    f('rgba(90,188,160,'+a+')',lx,ly,3,3);
  }
  const fg=ctx.createLinearGradient(0,skyBot-10,0,H*0.6);
  fg.addColorStop(0,'rgba(10,24,40,0)'); fg.addColorStop(0.5,'rgba(10,24,40,0.15)'); fg.addColorStop(1,'rgba(10,24,40,0)');
  ctx.fillStyle=fg; ctx.fillRect(0,skyBot-10,W,H*0.6-skyBot+10);
}

function drawEnding8(canvas) {
  canvas.width = canvas.offsetWidth || 400;
  canvas.height = canvas.offsetHeight || 700;
  const ctx = canvas.getContext('2d');
  const W = canvas.width, H = canvas.height;

  // 天空漸層：黎明橘金
  const sky = ctx.createLinearGradient(0,0,0,H*0.62);
  sky.addColorStop(0,'#0d1a2e');
  sky.addColorStop(0.35,'#1a3a5c');
  sky.addColorStop(0.65,'#c45a10');
  sky.addColorStop(1,'#e8a030');
  ctx.fillStyle = sky; ctx.fillRect(0,0,W,H*0.62);

  // 海面漸層
  const sea = ctx.createLinearGradient(0,H*0.6,0,H);
  sea.addColorStop(0,'#1a4a6a');
  sea.addColorStop(0.4,'#0e2a40');
  sea.addColorStop(1,'#060f18');
  ctx.fillStyle = sea; ctx.fillRect(0,H*0.6,W,H*0.4+2);

  // 海平線光暈
  const glow = ctx.createRadialGradient(W*0.5,H*0.61,0,W*0.5,H*0.61,W*0.55);
  glow.addColorStop(0,'rgba(220,120,20,0.55)');
  glow.addColorStop(0.4,'rgba(200,90,10,0.18)');
  glow.addColorStop(1,'transparent');
  ctx.fillStyle = glow; ctx.fillRect(0,H*0.3,W,H*0.5);

  // 海面光柱倒影
  for(let i=0;i<18;i++){
    const x = W*0.5 + (Math.random()-0.5)*W*0.18;
    const ww = 2+Math.random()*5;
    const hh = H*0.04+Math.random()*H*0.1;
    const refG = ctx.createLinearGradient(0,H*0.62,0,H*0.62+hh);
    refG.addColorStop(0,'rgba(230,140,30,0.28)');
    refG.addColorStop(1,'transparent');
    ctx.fillStyle = refG;
    ctx.fillRect(x-ww/2, H*0.62, ww, hh);
  }

  // 星星（夜空殘存）
  [[0.08,0.04],[0.2,0.08],[0.38,0.03],[0.55,0.07],[0.72,0.05],[0.9,0.1],
   [0.15,0.16],[0.45,0.12],[0.82,0.18],[0.62,0.02]].forEach(([rx,ry])=>{
    ctx.fillStyle='rgba(255,240,200,0.7)';
    ctx.beginPath();
    ctx.arc(W*rx,H*ry,1.2,0,Math.PI*2);
    ctx.fill();
  });

  // 遠方島嶼輪廓（要離開的荒島）
  ctx.fillStyle='#0a1820';
  ctx.beginPath();
  ctx.moveTo(W*0.12,H*0.6);
  ctx.bezierCurveTo(W*0.18,H*0.52,W*0.28,H*0.5,W*0.38,H*0.58);
  ctx.bezierCurveTo(W*0.43,H*0.61,W*0.46,H*0.6,W*0.5,H*0.6);
  ctx.lineTo(W*0.12,H*0.6);
  ctx.fill();

  // 輕艇（兩人逃脫中）
  const bx = W*0.52, by = H*0.63;
  // 艇身
  ctx.fillStyle='#6a3a10';
  ctx.beginPath();
  ctx.ellipse(bx, by+6, 38, 9, 0, 0, Math.PI);
  ctx.fill();
  ctx.fillStyle='#8a5020';
  ctx.fillRect(bx-36, by-2, 72, 8);
  // 引擎泡沫
  for(let i=0;i<6;i++){
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(bx-40-i*7,by+8+Math.random()*4,2+Math.random()*2,0,Math.PI*2);
    ctx.fill();
  }

  // 人物剪影：主角
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(bx+8,by-26,6,24); // 身體
  ctx.beginPath(); ctx.arc(bx+11,by-30,5,0,Math.PI*2); ctx.fill(); // 頭
  // 揮手手臂
  ctx.lineWidth=3; ctx.strokeStyle='#0a0a0a'; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(bx+14,by-22); ctx.lineTo(bx+24,by-34); ctx.stroke();

  // 人物剪影：夥伴
  ctx.fillStyle='#0a0a0a';
  ctx.fillRect(bx-14,by-22,5,20); // 身體
  ctx.beginPath(); ctx.arc(bx-11,by-26,4,0,Math.PI*2); ctx.fill(); // 頭

  // 波浪
  for(let row=0;row<4;row++){
    ctx.strokeStyle='rgba(100,180,220,'+(0.08+row*0.04)+')';
    ctx.lineWidth=1;
    ctx.beginPath();
    const y=H*0.67+row*H*0.06;
    for(let x=0;x<W;x+=2){
      const wave=Math.sin((x+row*40)/30)*3;
      row===0&&x===0?ctx.moveTo(x,y+wave):ctx.lineTo(x,y+wave);
    }
    ctx.stroke();
  }

  // 橘色暖光暈（畫面中央氛圍）
  const warmG = ctx.createRadialGradient(W*0.5,H*0.62,0,W*0.5,H*0.62,W*0.4);
  warmG.addColorStop(0,'rgba(210,100,20,0.12)');
  warmG.addColorStop(1,'transparent');
  ctx.fillStyle=warmG; ctx.fillRect(0,0,W,H);
}

function showEnding(key) {
  const data = ENDING_DATA[key];
  if (!data) return;
  const overlay = document.getElementById('ending-overlay');
  overlay.style.display = 'flex';
  const canvas = document.getElementById('ending-canvas');
  requestAnimationFrame(() => data.goddess ? drawGoddessEnding(canvas) : data.ending8 ? drawEnding8(canvas) : drawEndingBg(canvas, data.color));
  document.getElementById('ending-num').textContent = data.num;
  document.getElementById('ending-title').textContent = data.title;
  document.getElementById('ending-sub').textContent = data.sub;
  document.getElementById('ending-title').style.textShadow = `0 0 30px ${data.color}cc`;
  document.getElementById('ending-restart').style.borderColor = data.color + '80';
  requestAnimationFrame(() => {
    ['ending-num','ending-title','ending-sub','ending-restart'].forEach((id,i) => {
      setTimeout(() => { document.getElementById(id).style.opacity = '1'; }, i * 200);
    });
  });
}

function closeEnding() {
  const overlay = document.getElementById('ending-overlay');
  overlay.style.opacity = '0';
  overlay.style.transition = 'opacity 1s';
  setTimeout(() => {
    overlay.style.display = 'none';
    overlay.style.opacity = '1';
    overlay.style.transition = '';
    ['ending-num','ending-title','ending-sub','ending-restart'].forEach(id => {
      document.getElementById(id).style.opacity = '0';
    });
    goto('重新開始');
  }, 1000);
}
